            <div class="container mt-4" style="margin: 40px;">
                <!--<div class="container" >

                    <p class="mb-3 ms-4" style="color: rgb(237, 237, 237);">

                <playlist-header 
                    list-title="Superheroes !!" 
                    list-description="Recap de pelis de marvel">
                </playlist-header>
                <edit-playlist-modal id="my-modal"></edit-playlist-modal>

                <!-- Script para conectarlos -->
                <script>
                const header = document.getElementById('my-header');
                const modal = document.getElementById('my-modal');

                // 1. Cuando se hace clic en "Editar Info" en el header, abrimos el modal
                document.addEventListener('edit-playlist', (e) => {
                    // Le pasamos los datos actuales al modal
                    modal.setAttribute('list-title', e.detail.currentTitle);
                    modal.setAttribute('list-description', e.detail.currentDescription);
                    // Abrimos el modal llamando a su método
                    modal.open(); 
                });

                // 2. Cuando el usuario da clic en "Guardar Cambios" en el modal
                document.addEventListener('playlist-save', (e) => {
                    const nuevoTitulo = e.detail.title;
                    const nuevaDesc = e.detail.description;

                    // Actualizamos el header visualmente
                    header.setAttribute('list-title', nuevoTitulo);
                    header.setAttribute('list-description', nuevaDesc);

                    // Aquí también podrías hacer tu llamada fetch() a tu base de datos (Backend)
                    // console.log("Guardando en BD:", nuevoTitulo, nuevaDesc);
                });
                </script>
