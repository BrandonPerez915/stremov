<!DOCTYPE html>
<html lang="es" data-theme="dark" primary-color="blue">

<head>
  <link rel="stylesheet" href="../assets/css/search.css">

  <script>
    (function() {
      var theme = localStorage.getItem('appTheme') || 'dark';
      var color = localStorage.getItem('appPrimaryColor') || 'blue';
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.setAttribute('primary-color', color);
    })();
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search - stremov</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,200,0..1,0" />

  <script type="module" src="../components/CustomInput.js" defer></script>
  <script type="module" src="../components/SidebarUser.js" defer></script>
  <script type="module" src="../components/SidebarItem.js" defer></script>
  <script type="module" src="../components/CustomHeader.js" defer></script>
  <script type="module" src="../components/FiltersModal.js" defer></script>
  <script type="module" src="../components/CustomSidebar.js" defer></script>
  <script type="module" src="../components/CustomTextarea.js" defer></script>
  <script type="module" src="../components/MovieCard.js"></script>
  <script type="module" src="../components/HeroBanner.js" defer></script>
  <script type="module" src="../components/movieCarousel.js" defer></script>
  <script type="module" src="../components/PersonCarousel.js" defer></script>
  <script type="module" src="../components/PersonProfileCard.js" defer></script>
  <script type="module" src="../components/ReviewCard.js" defer></script>
  <script type="module" src="../components/StarsInput.js" defer></script>
  <script type="module" src="../components/RatingBars.js" defer></script>

  <script type="module" src="../components/UserCard.js" defer></script>

  <script type="module" src="../components/MovieModalHeader.js" defer></script>
  <script type="module" src="../components/MovieModalDetails.js" defer></script>
  <script type="module" src="../components/MovieModalReviews.js" defer></script>
  <script type="module" src="../components/MovieModalSimilar.js" defer></script>
  <script type="module" src="../components/MovieModal.js" defer></script>

  <style>
    /* Estilos rápidos para el contenedor de usuarios */
    .users-section {
      padding: 0 30px 40px 30px;
    }
    .users-section h2 {
      color: white;
      font-weight: 500;
      margin-bottom: 20px;
      font-size: 1.5rem;
    }
    .users-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
    .loading-text, .empty-text, .error-text {
      color: var(--text-secondary, #a0a0a0);
      font-size: 1rem;
    }
    .error-text {
      color: var(--red-100, #e50914);
    }
  </style>
</head>

<body>
  <div class="backdrop hidden"></div>

  <custom-header
    placeholder="Search something..."
    on-search="console.log('Buscando:', searchTerm)"
    has-notifications>
  </custom-header>

  <custom-sidebar
    following-users-info='[
      {"name": "Brandon Perez", "imgSrc": "https://images.unsplash.com/photo-1603415526960-f7e0328c63b1?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8cHJvZmlsZSUyMHBpY3R1cmV8ZW58MHx8MHx8fDA%3D", "verified": true},
      {"name": "Alex Juarez", "imgSrc": "https://images.unsplash.com/photo-1654110455429-cf322b40a906?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8cHJvZmlsZSUyMHBpY3R1cmV8ZW58MHx8MHx8fDA%3D", "verified": false},
      {"name": "Carla Torres", "imgSrc": "https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?w=100&auto=format&fit=crop", "verified": true}
    ]'>
  </custom-sidebar>

  <h1 style="color: white; padding-left: 30px; font-weight: 500; margin-top: 20px;">
    Search results for <span id="search-query-display" style="color: var(--primary-color);"></span>
  </h1>

  <media-carousel id="movies-results"
    title="Movies Results"
    api-url=""
    type="movies">
  </media-carousel>

  <media-carousel id="series-results"
    title="Series Results"
    api-url=""
    type="series">
  </media-carousel>

  <person-carousel id="person-results"
    title="Persons Results"
    api-url=""
    type="persons">
  </person-carousel>

  <div id="users-section" class="users-section" style="display: none;">
    <h2>Users Results</h2>
    <div id="users-grid" class="users-grid">
      </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const query = urlParams.get('query') || '';
      const displaySpan = document.getElementById('search-query-display');

      let filters = {
        type: ['movies', 'series'],
        genre: ['action', 'comedy', 'drama', 'horror', 'scifi', 'documentary'],
        people: ['users', 'actors', 'directors']
      };

      const savedFilters = localStorage.getItem('searchFilters');
      let hasCustomFilters = false;

      if (savedFilters) {
        try {
          filters = JSON.parse(savedFilters);
          hasCustomFilters = true;
        } catch (e) {
          console.error("Error leyendo los filtros:", e);
        }
      }

      if (query) {
        displaySpan.textContent = `"${query}" ${hasCustomFilters ? '(Filtered)' : ''}`;
        document.title = `Search: ${query} - stremov`;
      } else if (hasCustomFilters) {
        displaySpan.textContent = `Applied Filters`;
        document.title = `Search Filters - stremov`;
      } else {
        displaySpan.textContent = `All Content`;
      }

      const genreParams = filters.genre && filters.genre.length > 0
        ? `&genres=${filters.genre.join(',')}`
        : '';

      const moviesCarousel = document.getElementById('movies-results');
      const seriesCarousel = document.getElementById('series-results');
      const personsCarousel = document.getElementById('person-results');

      // Referencias al contenedor de usuarios locales
      const usersSection = document.getElementById('users-section');
      const usersGrid = document.getElementById('users-grid');

      // -- MOVIES --
      if (filters.type.includes('movies')) {
        moviesCarousel.style.display = 'block';
        moviesCarousel.setAttribute('api-url', `/tmdb/movies/search?q=${encodeURIComponent(query)}${genreParams}`);
      } else {
        moviesCarousel.style.display = 'none';
      }

      // -- SERIES --
      if (filters.type.includes('series')) {
        seriesCarousel.style.display = 'block';
        seriesCarousel.setAttribute('api-url', `/tmdb/series/search?q=${encodeURIComponent(query)}${genreParams}`);
      } else {
        seriesCarousel.style.display = 'none';
      }

      // -- ACTORES/DIRECTORES --
      if (filters.people.includes('actors') || filters.people.includes('directors')) {
        personsCarousel.style.display = 'block';
        const roles = [];
        if (filters.people.includes('actors')) roles.push('actor');
        if (filters.people.includes('directors')) roles.push('director');
        personsCarousel.setAttribute('api-url', `/tmdb/persons/search?q=${encodeURIComponent(query)}&roles=${roles.join(',')}`);
      } else {
        personsCarousel.style.display = 'none';
      }

      // -- USUARIOS DE LA APP (Fetch manual) --
      if (filters.people.includes('users')) {
        usersSection.style.display = 'block';

        if (query) {
          usersGrid.innerHTML = '<span class="loading-text">Loading users...</span>';

          // Ajusta esta ruta a tu verdadero endpoint de usuarios locales
          // (por ejemplo: http://localhost:3000/api/users/${query})
          fetch(`http://localhost:3000/api/users/${encodeURIComponent(query)}`)
            .then(response => {
              if (!response.ok) throw new Error('Failed to fetch users');
              return response.json();
            })
            .then(data => {
              usersGrid.innerHTML = ''; // Limpiar estado de carga

              if (data.users && data.users.length > 0) {
                // Crear e insertar un <user-card> por cada usuario recibido
                data.users.forEach(userData => {
                  const card = document.createElement('user-card');
                  card.user = userData; // Pasamos el objeto completo al setter del componente
                  usersGrid.appendChild(card);
                });
              } else {
                usersGrid.innerHTML = '<span class="empty-text">No users found.</span>';
              }
            })
            .catch(error => {
              console.error('Error:', error);
              usersGrid.innerHTML = '<span class="error-text">Failed to load users.</span>';
            });
        } else {
          usersGrid.innerHTML = '<span class="empty-text">Type a name in the search bar to find users.</span>';
        }
      } else {
        usersSection.style.display = 'none';
      }
    });

    // ----------------------------------------------------
    // Listeners Globales
    // ----------------------------------------------------

    document.addEventListener('header-search', (e) => {
      const newQuery = e.detail.query;
      window.location.href = `search.html?query=${encodeURIComponent(newQuery.trim())}`;
    });

    document.addEventListener('filters-applied', (e) => {
      const filters = e.detail;
      localStorage.setItem('searchFilters', JSON.stringify(filters));
      window.location.reload();
    });

    document.addEventListener('movie-clicked', (e) => {
      const { movieId, type } = e.detail;
      const modal = document.createElement('movie-modal');
      const endpoint = type === 'series' ? 'series' : 'movies';
      modal.setAttribute('api-url', `/tmdb/${endpoint}/${movieId}`);
      modal.setAttribute('open', '');
      document.body.appendChild(modal);
    });
  </script>
</body>
</html>
