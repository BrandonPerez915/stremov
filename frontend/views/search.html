<head>
  <link rel="stylesheet" href="../assets/css/search.css">
  <script src="../components/Navbar.js"></script>
  <script src="../components/MovieCard.js"></script>
</head>

<body style="padding: 0; margin: 0">
  <cine-navbar user-name="Juan"
    user-avatar="https://i.pinimg.com/736x/29/c7/74/29c774e75daecdf5d3360bf9707272bb.jpg"></cine-navbar>

  <section id="search-section">
    <h1>Buscar Películas</h1>
    <div class="search-container">
      <input 
        type="text" 
        id="search-input" 
        class="search-input" 
        placeholder="Busca una película, actor o director..."
        autocomplete="off"
      >
      <button id="search-btn" class="search-btn">Buscar</button>
    </div>
    <div id="search-filters" class="search-filters">
      <label class="filter-option">
        <input type="checkbox" value="all" checked> Todos los géneros
      </label>
      <label class="filter-option">
        <input type="checkbox" value="action"> Acción
      </label>
      <label class="filter-option">
        <input type="checkbox" value="drama"> Drama
      </label>
      <label class="filter-option">
        <input type="checkbox" value="comedy"> Comedia
      </label>
      <label class="filter-option">
        <input type="checkbox" value="scifi"> Ciencia Ficción
      </label>
    </div>
  </section>

  <section id="search-results-section">
    <div class="results-header">
      <h2 id="results-title">Resultados de búsqueda</h2>
      <p id="results-count" class="results-count">0 películas encontradas</p>
    </div>
    <div class="search-results"></div>
  </section>

  <script>
    const searchInput = document.getElementById('search-input');
    const searchBtn = document.getElementById('search-btn');
    const searchResults = document.querySelector('.search-results');
    const resultsTitle = document.getElementById('results-title');
    const resultsCount = document.getElementById('results-count');

    async function performSearch(query) {
      if (!query.trim()) {
        searchResults.innerHTML = '';
        resultsCount.textContent = '0 películas encontradas';
        return;
      }

      try {
        const response = await fetch('../mocks/response.json');
        const data = await response.json();

        // Filter movies based on search query
        const filteredMovies = data.Search.filter(movie =>
          movie.Title.toLowerCase().includes(query.toLowerCase()) ||
          movie.Year.includes(query)
        );

        searchResults.innerHTML = '';

        if (filteredMovies.length === 0) {
          searchResults.innerHTML = '<p class="no-results">No se encontraron películas</p>';
          resultsCount.textContent = '0 películas encontradas';
        } else {
          filteredMovies.forEach(movie => {
            const movieCard = document.createElement('movie-card');
            movieCard.setAttribute('title', movie.Title);
            movieCard.setAttribute('year', movie.Year);
            movieCard.setAttribute('poster', movie.Poster);
            searchResults.appendChild(movieCard);
          });

          resultsTitle.textContent = `Resultados para "${query}"`;
          resultsCount.textContent = `${filteredMovies.length} película${filteredMovies.length !== 1 ? 's' : ''} encontrada${filteredMovies.length !== 1 ? 's' : ''}`;
        }
      } catch (error) {
        console.error("Error cargando películas:", error);
        searchResults.innerHTML = '<p class="error-message">Error al cargar las películas</p>';
      }
    }

    searchBtn.addEventListener('click', () => {
      performSearch(searchInput.value);
    });

    searchInput.addEventListener('keypress', (event) => {
      if (event.key === 'Enter') {
        performSearch(searchInput.value);
      }
    });

    // Load initial movies on page load
    async function loadInitialMovies() {
      try {
        const response = await fetch('../mocks/response.json');
        const data = await response.json();

        data.Search.forEach(movie => {
          const movieCard = document.createElement('movie-card');
          movieCard.setAttribute('title', movie.Title);
          movieCard.setAttribute('year', movie.Year);
          movieCard.setAttribute('poster', movie.Poster);
          searchResults.appendChild(movieCard);
        });

        resultsCount.textContent = `${data.Search.length} películas disponibles`;
      } catch (error) {
        console.error("Error cargando películas:", error);
      }
    }

    loadInitialMovies();
  </script>
</body>
