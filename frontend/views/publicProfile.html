<!DOCTYPE html>
<html lang="es" data-theme="dark" primary-color="blue">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - stremov</title>
  <link rel="stylesheet" href="../assets/css/home.css">
  <link rel="stylesheet" href="../assets/css/profile.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,200,0..1,0" />

  <script src="../components/CustomInput.js" defer></script>
  <script src="../components/CustomToast.js" defer></script>
  <script src="../components/SidebarUser.js" defer></script>
  <script src="../components/SidebarItem.js" defer></script>
  <script src="../components/StarsInput.js" defer></script>
  <script src="../components/CustomHeader.js" defer></script>
  <script src="../components/CustomSidebar.js" defer></script>
  <script src="../components/ReviewCard.js" defer></script>
  <script src="../components/UserReviewCard.js" defer></script>
  <script type="module" src="../components/MovieCard.js"></script>
  <script type="module" src="../components/AddToListModal.js"></script>
  <script type="module" src="../components/ReviewsFavoritesContainer.js"></script>
  <script type="module" src="../components/UserProfileCard.js"></script>
</head>

<body>
  <div class="backdrop hidden"></div>

  <custom-header
    placeholder="Search something..."
    has-notifications>
  </custom-header>

  <custom-sidebar following-users-info='[]'></custom-sidebar>

  <main>
    <div id="profile-content" class="profile-container">
      <section class="profile-shell">
        <!-- detecta si es perfil propio o ajeno -->
        <user-profile-card id="profile-card"></user-profile-card>
      </section>

      <reviews-favorites-container id="reviews-favorites-container"></reviews-favorites-container>
    </div>
  </main>
</body>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const theme = localStorage.getItem('appTheme') || 'dark';
    const primaryColor = localStorage.getItem('appPrimaryColor') || 'blue';
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.setAttribute('primary-color', primaryColor);

    //Leer el username de la URL: /user/johndoe  o  /profile (perfil propio)
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    //Si la ruta es /user/:username usamos ese username
    //Si es /profile usamos el del token
    let username = '';

    if (pathParts[0] === 'user' && pathParts[1]) {
      username = pathParts[1];
    } else {
      //Perfil propio — leer del token
      try {
        const token = localStorage.getItem('jwtToken');
        if (token) {
          const payload = token.split('.')[1];
          const padded = payload.padEnd(payload.length + (4 - payload.length % 4) % 4, '=');
          const decoded = atob(padded.replace(/-/g, '+').replace(/_/g, '/'));
          username = JSON.parse(decodeURIComponent(
            Array.from(decoded, c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')
          )).username || '';
        }
      } catch {}
    }

    if (username) {
      document.title = `${username} - stremov`;
      const profileCard = document.getElementById('profile-card');
      profileCard.setAttribute('username', username);

      //Una vez que el componente carga el usuario, alimentar el container de reviews/favorites
      const tryLoadContainer = setInterval(() => {
        if (profileCard._profileUser) {
          clearInterval(tryLoadContainer);
          const userId = profileCard._profileUser._id;
          if (userId) {
            const container = document.getElementById('reviews-favorites-container');
            if (container) {
              container.data = { userId, listId: userId };
            }
          }
        }
      }, 200);
    } else {
      //Sin username redirigir a login
      window.location.href = '/login';
    }

    //Header con datos del usuario autenticado
    const header = document.querySelector('custom-header');
    try {
      const userData = JSON.parse(localStorage.getItem('userData') || '{}');
      if (userData?.username) header?.setAttribute('username', userData.username);
      const avatarUrl = localStorage.getItem('avatarUrl');
      if (avatarUrl) header?.setAttribute('img-src', avatarUrl);
    } catch {}

    document.addEventListener('header-logout-request', () => {
      localStorage.removeItem('jwtToken');
      localStorage.removeItem('userData');
      localStorage.removeItem('avatarUrl');
      window.location.href = '/home';
    });

    document.addEventListener('movie-clicked', (e) => {
      const { movieId, type } = e.detail;
      const modal = document.createElement('movie-modal');
      const endpoint = type === 'series' ? 'series' : 'movies';
      modal.setAttribute('api-url', `/tmdb/${endpoint}/${movieId}`);
      modal.setAttribute('open', '');
      document.body.appendChild(modal);
    });
  });
</script>

</html>
