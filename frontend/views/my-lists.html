<!doctype html>
<html lang="es" data-bs-theme="dark">
<head>
    <title>CineList - Mis Listas Creadas</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        body {
            background-color: #111 !important;
            color: white;
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        .lists-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid #222;
            padding-bottom: 20px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-header h1 {
            font-size: 36px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -1px;
        }

        .btn-create {
            background-color: #00d2ff;
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            font-weight: 700;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .btn-create:hover { filter: brightness(1.1); }
        .btn-create:active { transform: scale(0.96); }
        .btn-create svg { width: 18px; height: 18px; fill: currentColor; }

    </style>


    <script src="../components/Navbar.js" defer></script>
    <script src="../components/PlaylistCard.js" defer></script>
    <script src="../components/CreateListModal.js" defer></script>
</head>

<body>
    <header>
        <cine-navbar 
            user-name="Alex" user-avatar="https://ui-avatars.com/api/?name=Alex&background=00d2ff&color=fff">
        </cine-navbar>
    </header>

    <main class="lists-container">
        
        
        <div class="page-header">
            <h1>Mis Listas</h1>
            <button class="btn-create" id="btn-open-create">
                <svg viewBox="0 0 24 24">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                </svg>
                Crear nueva lista
            </button>
        </div>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="playlists-grid">
        </div>

    </main>


    <create-list-modal id="modal-crear"></create-list-modal>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnOpenCreate = document.getElementById('btn-open-create');
            const modalCrear = document.getElementById('modal-crear');
            const grid = document.getElementById('playlists-grid');

            // 1. Abrir Modal
            btnOpenCreate.addEventListener('click', () => {
                modalCrear.open();
            });


            document.addEventListener('list-create', (e) => {
                const nuevaLista = e.detail;
                
                console.log("Nueva lista creada:", nuevaLista);
                

                crearTarjeta(nuevaLista.title, nuevaLista.description, 0, 'https://via.placeholder.com/400x225/1a1a1a/00d2ff?text=Nueva+Lista');
            });


            const listasGuardadas = [
                {
                    id: "list_01",
                    title: "Romance !!",
                    description: "Pelis de Romance que arruinan mis estándares",
                    count: 12,
                    cover: "https://m.media-amazon.com/images/S/pv-target-images/f77d27385643d5db4f83441c921a190df10bdd0e532b72fbd73b9b600d53d48c.jpg" 
                },
                {
                    id: "list_02",
                    title: "Superheroes !!",
                    description: "Recap de pelis de marvel en orden cronológico",
                    count: 24,
                    cover: "https://m.media-amazon.com/images/M/MV5BMTc5MDE2ODcwNV5BMl5BanBnXkFtZTgwMzI2NzQ2NzM@._V1_QL75_UX380_CR0,0,380,562_.jpg"
                },
                {
                    id: "list_03",
                    title: "Para ver el finde",
                    description: "Películas recomendadas por amigos que aún no he visto.",
                    count: 5,
                    cover: "https://imgs.search.brave.com/P_5sqBZ8iASldcADDWAu8OOLMwgEaQU1hgCT9xKSD3s/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9tZWRp/YS50aGVtb3ZpZWRi/Lm9yZy90L3AvdzUz/M19hbmRfaDMwMF9m/YWNlLzhUZnlzM21E/WlZwNHROb0gya3Rt/MDZhMFRhdS5qcGc"
                }
            ];


            function crearTarjeta(title, desc, count, cover, id = 'new') {
                const col = document.createElement('div');
                col.className = 'col';

                const card = document.createElement('playlist-card');
                card.setAttribute('title', title);
                card.setAttribute('description', desc);
                card.setAttribute('count', count);
                card.setAttribute('cover', cover);
                card.setAttribute('list-id', id);

                col.appendChild(card);
                

                if(id === 'new') {
                    grid.prepend(col);
                } else {
                    grid.appendChild(col);
                }
            }


            listasGuardadas.forEach(lista => {
                crearTarjeta(lista.title, lista.description, lista.count, lista.cover, lista.id);
            });
        });
    </script>
</body>
</html>
