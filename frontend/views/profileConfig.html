<!DOCTYPE html>
<html lang="es" data-theme="dark" primary-color="blue">

<head>
	<link rel="stylesheet" href="../assets/css/home.css">
	<link rel="stylesheet" href="../assets/css/yourLists.css">

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Profile Config - stremov</title>
	<style>
		.profile-page {
			max-width: 980px;
			margin: 0 auto;
			padding: 24px;
			display: flex;
			flex-direction: column;
			gap: 22px;
		}

		.page-controls {
			display: flex;
			flex-wrap: wrap;
			gap: 12px;
			justify-content: center;
			align-items: center;
		}

		.control-btn {
			padding: 10px 18px;
			border-radius: 999px;
			border: 1px solid var(--border-color);
			background: transparent;
			color: var(--text-primary);
			cursor: pointer;
			transition: transform 0.2s ease, background 0.2s ease;
		}

		.control-btn:hover {
			background: rgba(255,255,255,0.08);
			transform: translateY(-1px);
		}
	</style>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,250,0,0" />

	<script src="../components/CustomInput.js" defer></script>
	<script src="../components/CustomTextarea.js" defer></script>
	<script src="../components/SidebarUser.js" defer></script>
	<script src="../components/SidebarItem.js" defer></script>
	<script src="../components/CustomHeader.js" defer></script>
	<script src="../components/CustomSidebar.js" defer></script>
	<script type="module" src="../components/MovieCard.js" defer></script>
	<script src="../components/UserProfileView.js" type="module" defer></script>

</head>

<body>
	<div class="backdrop hidden"></div>

	<custom-header
		placeholder="Search something..."
		has-notifications>
	</custom-header>

	<custom-sidebar
		following-users-info='[
			{"name": "Brandon Perez", "imgSrc": "https://images.unsplash.com/photo-1603415526960-f7e0328c63b1?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8cHJvZmlsZSUyMHBpY3R1cmV8ZW58MHx8MHx8fDA%3D", "verified": true},
			{"name": "Alex Juarez", "imgSrc": "https://images.unsplash.com/photo-1654110455429-cf322b40a906?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8cHJvZmlsZSUyMHBpY3R1cmV8ZW58MHx8MHx8fDA%3D", "verified": false},
			{"name": "Carla Torres", "imgSrc": "https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?w=100&auto=format&fit=crop", "verified": true}
		]'>
	</custom-sidebar>

	<main class="profile-page">
		<div class="page-controls">
			<button id="theme-toggle-btn" class="control-btn">Cambiar modo</button>
			<button id="color-toggle-btn" class="control-btn">Color principal</button>
		</div>

		<user-profile-view></user-profile-view>
	</main>

	<script>
		const themeToggleBtn = document.getElementById('theme-toggle-btn');
		const colorToggleBtn = document.getElementById('color-toggle-btn');
		const colorOptions = ['blue', 'yellow', 'red', 'green', 'purple'];

		function setTheme(theme) {
			document.documentElement.setAttribute('data-theme', theme);
			localStorage.setItem('appTheme', theme);
			themeToggleBtn.textContent = theme === 'dark' ? '\u{263D}' : '\u2600';
		}

		function setPrimaryColor(color) {
			document.documentElement.setAttribute('primary-color', color);
			localStorage.setItem('appPrimaryColor', color);
			colorToggleBtn.textContent = `Color principal: ${color}`;
		}

		function loadPreferences() {
			const savedTheme = localStorage.getItem('appTheme') || document.documentElement.getAttribute('data-theme') || 'dark';
			const savedColor = localStorage.getItem('appPrimaryColor') || document.documentElement.getAttribute('primary-color') || 'blue';
			setTheme(savedTheme);
			setPrimaryColor(savedColor);
		}

		themeToggleBtn.addEventListener('click', () => {
			const nextTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
			setTheme(nextTheme);
		});

		colorToggleBtn.addEventListener('click', () => {
			const current = document.documentElement.getAttribute('primary-color') || 'blue';
			const nextIndex = (colorOptions.indexOf(current) + 1) % colorOptions.length;
			setPrimaryColor(colorOptions[nextIndex]);
		});

		loadPreferences();
	</script>
</body>

</html>
