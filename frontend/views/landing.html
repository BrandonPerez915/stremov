<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineList — Tu plataforma de películas y series</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .app-name {
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -1px;
      margin: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: white;
    }

    .logo-icon {
      width: 24px;
      height: 24px;
      fill: #00d2ff;
    }

    :root {
      --accent: #00d2ff;
      --accent-dim: rgba(0, 210, 255, 0.15);
      --bg: #000;
      --text: #fff;
      --muted: #888;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 24px;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.6) 50%, #000 100%),
        url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1600&q=80') center/cover no-repeat;
      z-index: 0;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 780px;
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-dim);
      border: 1px solid rgba(0,210,255,0.3);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 28px;
      animation: fadeUp 0.9s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(50px, 9vw, 90px);
      line-height: 0.95;
      letter-spacing: 1px;
      margin-bottom: 24px;
      animation: fadeUp 0.9s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .hero-title span {
      color: var(--accent);
    }

    .hero-sub {
      font-size: clamp(15px, 2vw, 18px);
      color: #aaa;
      line-height: 1.6;
      max-width: 520px;
      margin: 0 auto 40px;
      animation: fadeUp 0.9s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .hero-actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeUp 0.9s 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: filter 0.2s, transform 0.15s;
      display: inline-block;
    }

    .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
    .btn-primary:active { transform: scale(0.97); }

    .btn-secondary {
      background: transparent;
      color: #fff;
      border: 1px solid #444;
      border-radius: 12px;
      padding: 14px 32px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      display: inline-block;
    }

    .btn-secondary:hover { border-color: #888; background: rgba(255,255,255,0.05); transform: translateY(-1px); }

    /* animaciones */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* navbar */
    .top-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 40px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    }

    .nav-actions { display: flex; gap: 12px; }

    .nav-link {
      text-decoration: none;
      color: #aaa;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      transition: color 0.2s;
    }

    .nav-link:hover { color: white; }

    .nav-link.accent {
      background: var(--accent);
      color: #000;
      font-weight: 700;
    }

    .nav-link.accent:hover { filter: brightness(1.1); color: #000; }
  </style>
</head>
<body>

  <nav class="top-nav">
    <a href="landing.html" class="brand">
      <svg class="logo-icon" viewBox="0 -960 960 960">
       <path d="M160-80q-33 0-56.5-23.5T80-160v-480q0-25 13.5-45t36.5-29l506-206 26 66-330 134h468q33 0 56.5 23.5T880-640v480q0 33-23.5 56.5T800-80H160Zm0-80h640v-280H160v280Zm231-69q29-29 29-71t-29-71q-29-29-71-29t-71 29q-29 29-29 71t29 71q29 29 71 29t71-29ZM160-520h480v-80h80v80h80v-120H160v120Zm0 360v-280 280Z"/>
      </svg>
      <h1 class="app-name">CineList</h1>
    </a>
    <div class="nav-actions">
      <a href="login.html" class="nav-link">Iniciar sesión</a>
      <a href="register.html" class="nav-link accent">Registrarse</a>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <div class="hero-eyebrow">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><circle cx="5" cy="5" r="5"/></svg>
        Tu mundo cinematográfico
      </div>
      <h1 class="hero-title">Tu plataforma de<br><span>películas</span> y series</h1>
      <p class="hero-sub">Descubre, califica y organiza tus películas favoritas. Crea listas personalizadas y descubre nuevas historias.</p>
      <div class="hero-actions">
        <a href="register.html" class="btn-primary">Comenzar Ahora</a>
        <a href="login.html" class="btn-secondary">Iniciar Sesión</a>
      </div>
    </div>
  </div>
</body>
</html>
