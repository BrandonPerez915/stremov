<body>
  <div class="backdrop hidden"></div>
  <custom-header
  placeholder="Search something..."
  img-src="https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?w=100&auto=format&fit=crop"
  on-search="console.log('Buscando:', searchTerm)"
  has-notifications></custom-header>
  <custom-sidebar
  following-users-info='[
    {"name": "Brandon Perez", "imgSrc": "https://images.unsplash.com/photo-1603415526960-f7e0328c63b1?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8cHJvZmlsZSUyMHBpY3R1cmV8ZW58MHx8MHx8fDA%3D", "verified": true},
    {"name": "Alex Juarez", "imgSrc": "https://images.unsplash.com/photo-1654110455429-cf322b40a906?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8cHJvZmlsZSUyMHBpY3R1cmV8ZW58MHx8MHx8fDA%3D", "verified": false},
      {"name": "Carla Torres", "imgSrc": "https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?w=100&auto=format&fit=crop", "verified": true}
    ]'></custom-sidebar>

    <!-- Hero Banner (Project Hail Mary) -->
    <hero-banner
      title="Project Hail Mary"
      rating="8.6"
      badge-text="TRENDING"
      images="https://wallpapercave.com/wp/wp16284846.webp, https://wallpapercave.com/wp/wp16284849.webp, https://wallpapercave.com/wp/wp16284854.webp, https://wallpapercave.com/wp/wp16284872.webp">
    </hero-banner>

    <!-- Carrouseles de películas y series -->
    <movie-carousel
      title="Most Popular Series"
      api-url="../mocks/popularSeries.json"
      type="series">
    </movie-carousel>

    <movie-carousel
      title="Most Popular Movies"
      api-url="../mocks/popularMovies.json"
      type="movies">
    </movie-carousel>

    <person-carousel
      title="Most Popular Actors"
      api-url="../mocks/popularPeople.json">
    </person-carousel>

  </body>
  <script>
    const headerComponent = document.querySelector('movie-modal-header');

    headerComponent.addEventListener('tab-changed', (e) => {
      let lastTab = headerComponent.lastActiveTab || 'information';
      console.log(lastTab, e.detail.tab);
      let targetTab = e.detail.tab;

      if (lastTab === targetTab) return;

      const lastView = document.getElementById(`movie-${lastTab}-modal`);
      const targetView = document.getElementById(`movie-${targetTab}-modal`);
      const allViews = document.querySelectorAll('[id^="movie-"][id$="-modal"]');

      targetView.classList.remove('hidden');
      lastView.classList.toggle('hidden');
    });

    headerComponent.addEventListener('close-modal', (e) => {
      let movieModalElement = document.getElementById(e.detail.modalId);

      movieModalElement?.classList.add('close');
      setTimeout(() => {
        movieModalElement.style.display = 'none';
      }, 400);
    });

    const detailsComponent = document.querySelector('movie-modal-details');

    detailsComponent.addEventListener('action-rate', () => {
      console.log("¡El usuario quiere calificar la película!");
    });

    detailsComponent.addEventListener('action-watchlist', () => {
      console.log("¡Película añadida a la Watchlist!");
    });
    // Datos simulados (Inyeccion de reviews)
    const reviewsData = [
      {
        username: "Albert Flores",
        avatarSrc: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=100&q=80",
        rating: 2,
        date: "17 Oct, 2020",
        text: "It's good to use for the development as it having very good performance. I've taken it for Mobile Application Development and satisfied with the build performance."
      },
      {
        username: "Cameron Williamson",
        avatarSrc: "https://images.unsplash.com/photo-1522529599102-193c0d76b5b6?auto=format&fit=crop&w=100&q=80",
        rating: 4,
        date: "24 Sep, 2020",
        text: "Absolutely stunning display. The battery life is exactly as advertised, easily getting me through a full day of heavy coding."
      }
    ];

    // Inyectar el JSON como string
    const reviewsComponent = document.getElementById('reviews-component');
    reviewsComponent.setAttribute('reviews-data', JSON.stringify(reviewsData));

    // Escuchar el custom event de nueva reseña
    reviewsComponent.addEventListener('review-submitted', (e) => {
      const { rating, text } = e.detail;
      console.log(`¡Nueva reseña guardada!\nEstrellas: ${rating}\nTexto: ${text}`);

      // TODO: hacer push al array 'reviewsData' y volver a hacer setAttribute
      // para que la nueva tarjeta aparezca instantáneamente en la interfaz.
    });
  </script>
</html>
