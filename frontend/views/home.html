<!DOCTYPE html>
<html lang="es" data-theme="dark" primary-color="blue">

<head>
  <link rel="stylesheet" href="../assets/css/home.css">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - stremov</title>
  <!-- Fuente Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,250,0,0" />
  <!-- Componentes -->
  <script src="../components/CustomInput.js" defer></script>
  <script src="../components/SidebarUser.js" defer></script>
  <script src="../components/SidebarItem.js" defer></script>
  <script src="../components/CustomHeader.js" defer></script>
  <script src="../components/CustomSidebar.js" defer></script>
  <script src="../components/CustomTextarea.js" defer></script>
  <script type="module" src="../components/MovieCard.js"></script>
  <script src="../components/HeroBanner.js" defer></script>
  <script type="module" src="../components/movieCarousel.js" defer></script>
  <script type="module" src="../components/PersonCarousel.js" defer></script>
  <script src="../components/PersonProfileCard.js" defer></script>
  <script src="../components/ReviewCard.js" defer></script>
  <script src="../components/StarsInput.js" defer></script>
  <script src="../components/RatingBars.js" defer></script>

  <script src="../components/MovieModalHeader.js" defer></script>
  <script type="module" src="../components/MovieModalDetails.js" defer></script>
  <script type="module" src="../components/MovieModalReviews.js" defer></script>
  <script type="module" src="../components/MovieModalSimilar.js" defer></script>
  <script type="module" src="../components/MovieModal.js" defer></script>
</head>

<body>
  <div class="backdrop hidden"></div>
  <custom-header
  placeholder="Search something..."
  img-src="https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?w=100&auto=format&fit=crop"
  on-search="console.log('Buscando:', searchTerm)"
  has-notifications></custom-header>
  <custom-sidebar
  following-users-info='[
    {"name": "Brandon Perez", "imgSrc": "https://images.unsplash.com/photo-1603415526960-f7e0328c63b1?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8cHJvZmlsZSUyMHBpY3R1cmV8ZW58MHx8MHx8fDA%3D", "verified": true},
    {"name": "Alex Juarez", "imgSrc": "https://images.unsplash.com/photo-1654110455429-cf322b40a906?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8cHJvZmlsZSUyMHBpY3R1cmV8ZW58MHx8MHx8fDA%3D", "verified": false},
      {"name": "Carla Torres", "imgSrc": "https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?w=100&auto=format&fit=crop", "verified": true}
    ]'></custom-sidebar>

    <!-- Hero Banner (Project Hail Mary) -->
    <hero-banner
      title="Project Hail Mary"
      rating="8.6"
      badge-text="TRENDING"
      images="https://wallpapercave.com/wp/wp16284846.webp, https://wallpapercave.com/wp/wp16284849.webp, https://wallpapercave.com/wp/wp16284854.webp, https://wallpapercave.com/wp/wp16284872.webp">
    </hero-banner>

    <!-- Carrouseles de películas y series -->
    <media-carousel
      title="Most Popular Series"
      api-url="/tmdb/series/popular"
      type="series">
    </media-carousel>

    <media-carousel
      title="Most Popular Movies"
      api-url="/tmdb/movies/popular"
      type="movies">
    </media-carousel>

    <person-carousel
      title="Most Popular Actors"
      api-url="/tmdb/persons/popular">
    </person-carousel>

  </body>
  <script>
    document.addEventListener('header-search', (e) => {
      const query = e.detail.query;
      console.log('Buscando:', query);
      if (query && query.trim() !== '') {
        window.location.href = `search.html?query=${encodeURIComponent(query.trim())}`;
      }
    });

    document.addEventListener('movie-clicked', (e) => {
      const { movieId, type } = e.detail;
      console.log(`Película clickeada: ID=${movieId}`);

      const modal = document.createElement('movie-modal');
      const endpoint = type === 'series' ? 'series' : 'movies';
      modal.setAttribute('api-url', `/tmdb/${endpoint}/${movieId}`);
      modal.setAttribute('open', '');
      document.body.appendChild(modal);
    });
  </script>
</html>
