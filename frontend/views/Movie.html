<!doctype html>
<html lang="es" data-bs-theme="dark">
<head>
    <title>CineList - Detalles de Película</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        body {
            background-color: #111 !important;
            color: white;
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        .movie-layout {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 50px;
        }

        .poster-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        #main-poster {
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            aspect-ratio: 2/3;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            width: 100%;
        }

        .btn-watchlist {
            flex: 1;
            background-color: #00d2ff;
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .btn-watchlist:active { transform: scale(0.96); }
        .btn-watchlist:hover { filter: brightness(1.1); }

        .btn-favorites {
            flex: 1;
            background-color: transparent;
            color: #fff;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .btn-favorites:active { transform: scale(0.96); }
        .btn-favorites:hover { background-color: rgba(255, 255, 255, 0.08); }

        .btn-icon { width: 18px; height: 18px; fill: currentColor; }

        @media (max-width: 768px) {
            .movie-layout {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            .poster-wrapper {
                max-width: 350px;
                margin: 0 auto;
            }
        }
    </style>

    <script src="../components/Navbar.js" defer></script>
    <script src="../components/MovieDetails.js" defer></script>
    <script src="../components/AddListModal.js" defer></script>
</head>

<body>
    <header>
        <cine-navbar 
            user-name="Alex" user-avatar="https://ui-avatars.com/api/?name=Alex&background=00d2ff&color=fff">
        </cine-navbar>

    </header>

    <main class="movie-layout">
        <div class="poster-wrapper">
            <img id="main-poster" src="" alt="Cargando póster..." />
            
            <div class="action-buttons">
                <button class="btn-watchlist" id="btn-open-lists">
                    <svg class="btn-icon" viewBox="0 0 24 24">
                        <path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/>
                    </svg>
                    Watchlist
                </button>
                <button class="btn-favorites" id="btn-favorite">
                    <svg class="btn-icon" viewBox="0 0 24 24">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                    </svg>
                    Favoritos
                </button>
            </div>
        </div>

        <div class="details-wrapper">
            <movie-details id="movie-info"></movie-details>
        </div>
    </main>

    <add-list-modal id="modal-listas"></add-list-modal>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const movieId = urlParams.get('id') || 'tt0848228';

            const moviesDB = {
                "tt0848228": {
                    title: "The Avengers", year: "2012", rating: "8.0", duration: "143 min", release: "2012",
                    director: "Joss Whedon", synopsis: "Cuando un enemigo inesperado surge como una gran amenaza para la seguridad mundial, Nick Fury decide reclutar a un equipo para salvar al mundo.",
                    cast: "Robert Downey Jr., Chris Evans, Scarlett Johansson, Mark Ruffalo",
                    poster: "https://m.media-amazon.com/images/M/MV5BNGE0YTVjNzUtNzJjOS00NGNlLTgxMzctZTY4YTE1Y2Y1ZTU4XkEyXkFqcGc@._V1_QL75_UX380_CR0,0,380,562_.jpg"
                },
                "tt4154796": {
                    title: "Avengers: Endgame", year: "2019", rating: "8.4", duration: "181 min", release: "2019",
                    director: "Anthony Russo, Joe Russo", synopsis: "Con la ayuda de los aliados restantes, los Vengadores se reúnen una vez más para revertir las acciones de Thanos.",
                    cast: "Robert Downey Jr., Chris Evans, Mark Ruffalo, Chris Hemsworth",
                    poster: "https://m.media-amazon.com/images/M/MV5BMTc5MDE2ODcwNV5BMl5BanBnXkFtZTgwMzI2NzQ2NzM@._V1_QL75_UX380_CR0,0,380,562_.jpg"
                }
            };

            const movieData = moviesDB[movieId] || {
                title: "Película no encontrada", year: "N/A", rating: "0.0", duration: "0 min", release: "N/A",
                director: "N/A", synopsis: "No se encontraron detalles.", cast: "N/A",
                poster: "https://via.placeholder.com/380x562/222222/666666?text=Póster+no+disponible"
            };

            document.getElementById('main-poster').src = movieData.poster;
            const movieInfo = document.getElementById('movie-info');
            movieInfo.setAttribute('title', movieData.title);
            movieInfo.setAttribute('year', movieData.year);
            movieInfo.setAttribute('rating', movieData.rating);
            movieInfo.setAttribute('duration', movieData.duration);
            movieInfo.setAttribute('release', movieData.release);
            movieInfo.setAttribute('director', movieData.director);
            movieInfo.setAttribute('synopsis', movieData.synopsis);
            movieInfo.setAttribute('cast', movieData.cast);

            const btnWatchlist = document.getElementById('btn-open-lists');
            const btnFavorite = document.getElementById('btn-favorite');
            const modalListas = document.getElementById('modal-listas');

            btnWatchlist.addEventListener('click', () => modalListas.open());

            let isFavorite = false;
            btnFavorite.addEventListener('click', () => {
                isFavorite = !isFavorite;
                if (isFavorite) {
                    btnFavorite.innerHTML = `<svg class="btn-icon" viewBox="0 0 24 24"><path fill="#00d2ff" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg> Favoritos`;
                    btnFavorite.style.borderColor = '#00d2ff';
                } else {
                    btnFavorite.innerHTML = `<svg class="btn-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg> Favoritos`;
                    btnFavorite.style.borderColor = '#444';
                }
            });
        });
    </script>
</body>
</html>
