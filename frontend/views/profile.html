<!DOCTYPE html>
<html lang="es" data-theme="dark" primary-color="blue">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil - stremov</title>
  <link rel="stylesheet" href="../assets/css/home.css">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,250,0,0" />

  <script src="../components/CustomInput.js" defer></script>
  <script src="../components/SidebarUser.js" defer></script>
  <script src="../components/SidebarItem.js" defer></script>
  <script src="../components/CustomHeader.js" defer></script>
  <script src="../components/CustomSidebar.js" defer></script>
  <script type="module" src="../components/MovieCard.js" defer></script>

    <script src="../components/MovieModalHeader.js" defer></script>
    <script type="module" src="../components/MovieModalDetails.js" defer></script>
    <script type="module" src="../components/MovieModalReviews.js" defer></script>
    <script type="module" src="../components/MovieModalSimilar.js" defer></script>
    <script type="module" src="../components/MovieModal.js" defer></script>
  <style>
    body {
      background: var(--bg-color);
      color: var(--text-primary);
    }

    .profile-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .profile-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      margin-bottom: 48px;
      text-align: center;
    }

    .profile-avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .profile-avatar {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid var(--primary-color);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }

    .profile-info {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .profile-name {
      font-size: 32px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.5px;
    }

    .profile-email {
      font-size: 16px;
      color: var(--text-secondary);
      margin: 0;
    }

    .profile-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 28px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 15px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--primary-color);
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-2px);
    }

    .icon {
      font-family: 'Material Symbols Outlined';
      font-size: 20px;
    }

    .divider {
      height: 1px;
      background: var(--border-color);
      margin: 40px 0;
    }

    .favorites-section {
      margin-top: 40px;
    }

    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title .icon {
      color: var(--primary-color);
      font-size: 24px;
    }

    .favorites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      animation: fadeIn 0.3s ease;
    }

    .favorites-empty {
      text-align: center;
      color: var(--text-secondary);
      padding: 40px 24px;
      font-size: 16px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .no-auth-container {
      text-align: center;
      padding: 60px 24px;
    }

    .no-auth-message {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .no-auth-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    @media (max-width: 720px) {
      .profile-container {
        padding: 24px 16px;
      }

      .profile-avatar {
        width: 120px;
        height: 120px;
      }

      .profile-name {
        font-size: 24px;
      }

      .profile-email {
        font-size: 14px;
      }

      .favorites-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 14px;
      }

      .section-title {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="backdrop hidden"></div>

  <custom-header
    placeholder="Search something..."
    has-notifications>
  </custom-header>

  <custom-sidebar
    following-users-info='[
      {"name": "Brandon Perez", "imgSrc": "https://images.unsplash.com/photo-1603415526960-f7e0328c63b1?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8cHJvZmlsZSUyMHBpY3R1cmV8ZW58MHx8MHx8fDA%3D", "verified": true},
      {"name": "Alex Juarez", "imgSrc": "https://images.unsplash.com/photo-1654110455429-cf322b40a906?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8cHJvZmlsZSUyMHBpY3R1cmV8ZW58MHx8MHx8fDA%3D", "verified": false},
      {"name": "Carla Torres", "imgSrc": "https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?w=100&auto=format&fit=crop", "verified": true}
    ]'>
  </custom-sidebar>

  <main>
    <div id="profile-content"></div>
  </main>

  <script type="module">
    import { getUser, getFavoriteList } from '../scripts/api.js';

    const colorOptions = ['blue', 'yellow', 'red', 'green', 'purple'];
    let currentUser = null;
    let favorites = [];

    async function loadProfileData() {
      const token = localStorage.getItem('jwtToken');
      if (!token) {
        renderNoAuth();
        return;
      }

      try {
        // Obtener datos del usuario
        const tokenPayload = token.split('.')[1];
        const padded = tokenPayload.padEnd(tokenPayload.length + (4 - (tokenPayload.length % 4)) % 4, '=');
        const decoded = atob(padded.replace(/-/g, '+').replace(/_/g, '/'));
        const json = decodeURIComponent(Array.from(decoded, char => '%' + ('00' + char.charCodeAt(0).toString(16)).slice(-2)).join(''));
        const parsed = JSON.parse(json);
        const username = parsed.username;

        const { user } = await getUser(username);
        currentUser = user || JSON.parse(localStorage.getItem('userData') || '{}');

        // Obtener lista de favoritos
        try {
          const favRes = await getFavoriteList(user?._id || user?.id);
          favorites = favRes?.movies || [];
        } catch (err) {
          favorites = [];
        }

        renderProfile();
      } catch (err) {
        console.warn('Error loading profile:', err);
        renderNoAuth();
      }
    }

    function renderProfile() {
      const container = document.getElementById('profile-content');
      const avatarUrl = currentUser?.avatarUrl || 
        currentUser?.avatar ||
        `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser?.username || 'User')}`;

      const favoritesHtml = favorites.length
        ? `
          <div class="section-title">
            <span class="icon">favorite</span>
            Mis Favoritos
          </div>
          <div class="favorites-grid">
            ${favorites.map((m) => `
              <movie-card 
                poster="${m.posterUrl || m.poster || ''}" 
                title="${(m.title || '').replace(/"/g, '&quot;')}" 
                rating="${m.imdbScore || m.rating || ''}" 
                media-id="${m.id || ''}" 
                genres="${(m.genres || []).join(',')}">
              </movie-card>
            `).join('')}
          </div>
        `
        : `<p class="favorites-empty">Aún no tienes favoritos. ¡Comienza a agregar tus películas favoritas!</p>`;

      container.innerHTML = `
        <div class="profile-container">
          <div class="profile-header">
            <div class="profile-avatar-section">
              <img src="${avatarUrl}" alt="Avatar" class="profile-avatar">
              <div class="profile-info">
                <h1 class="profile-name">${currentUser?.username || 'Usuario'}</h1>
                <p class="profile-email">${currentUser?.email || ''}</p>
              </div>
            </div>
            <div class="profile-actions">
              <button class="btn btn-primary" onclick="window.location.href='/profileConfig'">
                <span class="icon">edit</span>
                Editar Perfil
              </button>
            </div>
          </div>

          <div class="divider"></div>

          <div class="favorites-section">
            ${favoritesHtml}
          </div>
        </div>
      `;

      // Re-emitir events de movie-card
      document.querySelectorAll('movie-card').forEach((card) => {
        card.addEventListener('movie-clicked', (e) => {
          document.dispatchEvent(new CustomEvent('movie-clicked', { detail: e.detail, bubbles: true, composed: true }));
        });
      });
    }

    function renderNoAuth() {
      const container = document.getElementById('profile-content');
      container.innerHTML = `
        <div class="profile-container">
          <div class="no-auth-container">
            <p class="no-auth-message">Debes iniciar sesión para ver tu perfil</p>
            <div class="no-auth-actions">
              <button class="btn btn-primary" onclick="window.location.href='/login'">
                <span class="icon">login</span>
                Iniciar Sesión
              </button>
              <button class="btn btn-secondary" onclick="window.location.href='/register'">
                <span class="icon">person_add</span>
                Registrarse
              </button>
            </div>
          </div>
        </div>
      `;
    }

    // Cargar datos del perfil
    loadProfileData();

    // Manejar events de películas clickeadas
    document.addEventListener('movie-clicked', (e) => {
      const { movieId, type } = e.detail || {};
      if (!movieId) return;
      const modal = document.createElement('movie-modal');
      const endpoint = type === 'series' ? 'series' : 'movies';
      modal.setAttribute('api-url', `/tmdb/${endpoint}/${movieId}`);
      modal.setAttribute('open', '');
      document.body.appendChild(modal);
    });
  </script>
</body>

</html>
