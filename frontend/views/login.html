<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineList — Iniciar sesión</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    .app-name {
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -1px;
      margin: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: white;
    }

    .logo-icon {
      width: 24px;
      height: 24px;
      fill: #00d2ff;
    }

    :root {
      --accent: #00d2ff;
      --accent-dim: rgba(0, 210, 255, 0.12);
      --bg: #000;
      --surface: #0d0d0d;
      --border: #1e1e1e;
      --text: #fff;
      --muted: #666;
    }

    html,
    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
    }

    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 40px;
      border-bottom: 1px solid var(--border);
    }

    .nav-register {
      font-size: 14px;
      color: var(--muted);
    }

    .nav-register a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 11px;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input {
      background: #141414;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 13px 16px;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input::placeholder {
      color: #444;
    }

    input:focus {
      border-color: var(--accent);
    }

    .field-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .forgot-link {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .btn-submit {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: filter 0.2s, transform 0.15s;
    }

    .btn-submit:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .btn-submit:active {
      transform: scale(0.98);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #333;
      font-size: 12px;
      margin: 4px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #222;
    }

    .register-link {
      text-align: center;
      font-size: 14px;
      color: var(--muted);
      margin-top: 4px;
    }

    .register-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <nav class="top-nav">
    <a href="landing.html" class="brand">
      <svg class="logo-icon" viewBox="0 -960 960 960">
        <path
          d="M160-80q-33 0-56.5-23.5T80-160v-480q0-25 13.5-45t36.5-29l506-206 26 66-330 134h468q33 0 56.5 23.5T880-640v480q0 33-23.5 56.5T800-80H160Zm0-80h640v-280H160v280Zm231-69q29-29 29-71t-29-71q-29-29-71-29t-71 29q-29 29-29 71t29 71q29 29 71 29t71-29ZM160-520h480v-80h80v80h80v-120H160v120Zm0 360v-280 280Z" />
      </svg>
      <h1 class="app-name">CineList</h1>
    </a>
    <p class="nav-register">¿No tienes cuenta? <a href="register.html">Regístrate</a></p>
  </nav>

  <div class="page">
    <div class="card">
      <h1 class="card-title">Bienvenido de vuelta</h1>
      <p class="card-sub">Inicia sesión para continuar.</p>

      <div class="form">
        <div class="field">
          <label>Correo electrónico</label>
          <input type="email" placeholder="correo@ejemplo.com" required=true>
        </div>
        <div class="field">
          <div class="field-row">
            <label>Contraseña</label>
            <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
          </div>
          <input type="password" placeholder="Tu contraseña" required=true>
        </div>

        <button class="btn-submit" onclick="window.location.href='/'">Iniciar sesión</button>

        <div class="divider">o</div>

        <p class="register-link">¿No tienes cuenta? <a href="register.html">Regístrate gratis</a></p>
      </div>
    </div>
  </div>

</body>

</html>
