<!DOCTYPE html>
<html lang="es" data-theme="dark" primary-color="blue">

<head>
	<link rel="stylesheet" href="../assets/css/home.css">
	<link rel="stylesheet" href="../assets/css/yourLists.css">

	<script>
		(function() {
			var theme = localStorage.getItem('appTheme') || 'dark';
			var color = localStorage.getItem('appPrimaryColor') || 'blue';
			document.documentElement.setAttribute('data-theme', theme);
			document.documentElement.setAttribute('primary-color', color);
		})();
	</script>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Your Lists - stremov</title>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,250,0,0" />

	<script type="module" src="../components/CustomInput.js" defer></script>
	<script type="module" src="../components/CustomTextarea.js" defer></script>
	<script type="module" src="../components/SidebarUser.js" defer></script>
	<script type="module" src="../components/SidebarItem.js" defer></script>
	<script type="module" src="../components/CustomHeader.js" defer></script>
	<script type="module" src="../components/CustomSidebar.js" defer></script>
	<script type="module" src="../components/ListCard.js" defer></script>
	<script type="module" src="../components/CreateListModal.js" defer></script>
	<script type="module" src="../components/YourListsView.js" defer></script>
</head>

<body>
	<div class="backdrop hidden"></div>

	<custom-header hide-search has-notifications></custom-header>

	<custom-sidebar
		following-users-info='[
			{"name": "Brandon Perez", "imgSrc": "https://images.unsplash.com/photo-1603415526960-f7e0328c63b1?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8cHJvZmlsZSUyMHBpY3R1cmV8ZW58MHx8MHx8fDA%3D", "verified": true},
			{"name": "Alex Juarez", "imgSrc": "https://images.unsplash.com/photo-1654110455429-cf322b40a906?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8cHJvZmlsZSUyMHBpY3R1cmV8ZW58MHx8MHx8fDA%3D", "verified": false},
			{"name": "Carla Torres", "imgSrc": "https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?w=100&auto=format&fit=crop", "verified": true}
		]'
		active-page="lists"></custom-sidebar>


	<your-lists-view></your-lists-view>
</body>

	<script>
		document.addEventListener('DOMContentLoaded', () => {
			const theme = localStorage.getItem('appTheme') || 'dark';
			const primaryColor = localStorage.getItem('appPrimaryColor') || 'blue';
			document.documentElement.setAttribute('data-theme', theme);
			document.documentElement.setAttribute('primary-color', primaryColor);
		});
	</script>

</html>
